<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap');

        :root {
            --ultra-pink: #ff0a54;
            --hot-pink: #ff477e;
            --soft-pink: #ff85a2;
            --baby-pink: #fbb1bd;
            --fairy-pink: #ffe5ec;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="%23ff0a54" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'), auto; }

        body {
            background-color: var(--fairy-pink);
            background-image: radial-gradient(var(--baby-pink) 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Floating Teddies & Streamers */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Loading Screen Style */
        #loader-overlay {
            position: fixed;
            inset: 0;
            background: var(--fairy-pink);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .heart-loader {
            font-size: 50px;
            animation: beat 1s infinite;
            margin-bottom: 20px;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .progress-bar-wrap {
            width: 250px;
            height: 20px;
            background: white;
            border-radius: 10px;
            border: 3px solid var(--hot-pink);
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--soft-pink), var(--ultra-pink));
            transition: width 0.3s;
        }

        /* Main Container */
        #main-card {
            display: none;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 30px;
            border: 4px solid var(--hot-pink);
            box-shadow: 0 15px 35px rgba(255, 10, 84, 0.2);
            max-width: 90%;
            width: 450px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--ultra-pink);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .movie-badge {
            background: var(--ultra-pink);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 10, 84, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 10, 84, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 10, 84, 0); }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            min-height: 250px;
            position: relative;
        }

        .action-btn {
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yes-btn {
            background: var(--ultra-pink);
            color: white;
            z-index: 100;
        }

        .dodge-btn {
            background: var(--baby-pink);
            color: white;
            position: absolute;
            width: 100%;
        }

        /* Bubble Blast Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="decoration" style="top: 10%; left: 5%; font-size: 40px;">🧸</div>
    <div class="decoration" style="top: 15%; right: 10%; font-size: 40px; animation-delay: 1s;">🎉</div>
    <div class="decoration" style="bottom: 10%; left: 10%; font-size: 40px; animation-delay: 2s;">🕯️</div>
    <div class="decoration" style="bottom: 20%; right: 5%; font-size: 40px; animation-delay: 1.5s;">🧸</div>
    <div class="decoration" style="top: 50%; left: 2%; font-size: 30px;">🌸</div>

    <div id="loader-overlay">
        <div class="heart-loader">💖</div>
        <div class="loading-text" id="loading-msg" style="color: var(--ultra-pink); font-weight: bold; margin-bottom: 10px;">Initializing Cuteness...</div>
        <div class="progress-bar-wrap">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="main-card">
        <div class="movie-badge">JULY 31 • MOVIE DATE? 🍿</div>
        <h1>"My love life is messed up, your love life is messed up. It's fate, I think, that God wants us to unmess each other's lives."</h1>
        
        <p style="color: var(--hot-pink); font-size: 0.8rem; margin-bottom: 10px;">(P.S. Tum itni sundar ho ki darr lagta hai... 😉)</p>

        <div class="btn-group" id="container">
            <button id="maybe-btn" class="action-btn dodge-btn" style="top: 0;">MAYBE</button>
            <button id="no-btn" class="action-btn dodge-btn" style="top: 60px;">NO, ABSOLUTELY NOT</button>
            <button id="yes-btn" class="action-btn" style="position: absolute; bottom: 0; width: 100%;">YES, WE CAN TRY! ✨</button>
        </div>

        <p style="margin-top: 20px; font-size: 0.7rem; color: var(--soft-pink);">Apoorva, you're the <i>Jalebi</i> to my life's <i>Rabri</i>!</p>
    </div>

    <script>
        const progressFill = document.getElementById('progress-fill');
        const loadingMsg = document.getElementById('loading-msg');
        const loader = document.getElementById('loader-overlay');
        const card = document.getElementById('main-card');
        const yesBtn = document.getElementById('yes-btn');
        const messages = ["Loading Teddies...", "Polishing Streamers...", "Preparing Popcorn...", "Finalizing Destiny..."];

        // 1. Loading Logic
        let width = 0;
        let msgIndex = 0;
        const loadInterval = setInterval(() => {
            width += Math.random() * 5;
            if (width >= 100) {
                width = 100;
                clearInterval(loadInterval);
                createBlast();
                setTimeout(() => {
                    loader.style.display = 'none';
                    card.style.display = 'block';
                }, 800);
            }
            progressFill.style.width = width + '%';
            if(Math.floor(width) % 25 === 0) {
                loadingMsg.innerText = messages[msgIndex % messages.length];
                msgIndex++;
            }
        }, 100);

        // 2. Bubble Blast Logic
        function createBlast() {
            for(let i=0; i<60; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 20 + 10;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = `hsl(${Math.random() * 40 + 330}, 100%, 70%)`;
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.setProperty('--x', (Math.random() - 0.5) * 600 + 'px');
                p.style.setProperty('--y', (Math.random() - 0.5) * 600 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // 3. The "Impossible" Buttons Logic
        const dodgeButtons = document.querySelectorAll('.dodge-btn');
        let yesScale = 1;

        dodgeButtons.forEach(btn => {
            const move = (e) => {
                // Dodge logic
                const newTop = Math.random() * (window.innerHeight - 100);
                const newLeft = Math.random() * (window.innerWidth - 200);
                btn.style.position = 'fixed';
                btn.style.top = newTop + 'px';
                btn.style.left = newLeft + 'px';
                btn.style.width = '180px';

                // Make Yes button grow
                yesScale += 0.15;
                yesBtn.style.transform = `scale(${yesScale})`;
                
                // Add a cute sound effect placeholder logic (visual only)
                const spark = document.createElement('span');
                spark.innerText = '💖';
                spark.style.position = 'fixed';
                spark.style.left = e.pageX + 'px';
                spark.style.top = e.pageY + 'px';
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 500);
            };

            btn.addEventListener('mouseover', move);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); move(e.touches[0]); });
            
            btn.addEventListener('click', () => {
                if(btn.id === 'maybe-btn') window.location.href = "https://quotefancy.com/quote/1646489/John-Hurt-I-don-t-like-no-confusion";
                else window.location.href = "https://youtu.be/Qhwafoo7Pnc?si=L5J9_Cuc2EJE85F9";
            });
        });

        // 4. Final Redirect
        yesBtn.addEventListener('click', () => {
            window.location.href = "https://youtu.be/aBlsrtxuwss?si=rNcM07OzrY8kved9";
        });

        // 5. Heart Trail Effect
        document.addEventListener('mousemove', (e) => {
            if(Math.random() > 0.9) {
                const h = document.createElement('div');
                h.innerHTML = '🌸';
                h.style.position = 'fixed';
                h.style.left = e.clientX + 'px';
                h.style.top = e.clientY + 'px';
                h.style.pointerEvents = 'none';
                h.style.transition = 'all 1s';
                document.body.appendChild(h);
                setTimeout(() => {
                    h.style.transform = 'translateY(-50px)';
                    h.style.opacity = '0';
                    setTimeout(() => h.remove(), 1000);
                }, 10);
            }
        });
    </script>
</body>
</html>
